{% extends 'main/base_dashboard.html' %}

{% block content %}
<h2>Список работ</h2>
<a href="{% url 'work_create' %}" class="btn btn-primary mb-3">Добавить работу</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for work in works %}
        <tr>
            <td>{{ work.id }}</td>
            <td>{{ work.name }}</td>
            <td>
                <a href="{% url 'work_detail' work.pk %}" class="btn btn-sm btn-info">Просмотр</a>
                <a href="{% url 'work_edit' work.pk %}" class="btn btn-sm btn-warning">Редактировать</a>
                <a href="{% url 'work_delete' work.pk %}" class="btn btn-sm btn-danger">Удалить</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="3">Нет работ</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
