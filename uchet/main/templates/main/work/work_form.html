{% extends 'main/base_dashboard.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <h2 class="mb-4">{% if object %}Редактировать работу{% else %}Создать работу{% endif %}</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="{{ form.name.id_for_label }}" class="form-label">Название работы</label>
                {{ form.name.errors }}
                <input type="text" name="{{ form.name.name }}" id="{{ form.name.id_for_label }}" 
                       class="form-control {% if form.name.errors %}is-invalid{% endif %}" 
                       value="{{ form.name.value|default:'' }}">
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'work_list' %}" class="btn btn-secondary">Отмена</a>
            <a href="{% url 'dashboard_home' %}" class="btn btn-secondary">На главную</a>
        </form>
    </div>
</div>
{% endblock %}
