<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель руководителя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-color: #2a2a2a;
        }

        .director-topbar {
            background: #e5e7eb;
            border-bottom: 1px solid #d1d5db;
        }
        .director-topbar-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .director-app-name {
            font-size: 1.65rem;
            font-weight: 600;
            color: #111827;
            line-height: 1.1;
        }
        .director-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .director-user-name {
            font-size: 1.05rem;
            font-weight: 500;
            color: #111827;
            white-space: nowrap;
        }
        .director-logout-btn {
            border-radius: 10px;
            padding: 6px 10px;
            background-color: #374151;
            border-color: #374151;
            color: #ffffff;
        }
        .director-logout-btn:hover {
            background-color: #111827;
            border-color: #111827;
            color: #ffffff;
        }

        .director-main-wrap {
            min-height: calc(100vh - 56px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 24px 16px;
        }
        .director-main {
            max-width: 1280px;
            width: 100%;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <header class="director-topbar">
        <div class="director-topbar-inner">
            <a href="{% url 'director_dashboard' %}" class="text-decoration-none">
                <div class="director-app-name">TeachKPI</div>
            </a>

            <div class="director-user">
                <div class="director-user-name">
                    {{ user.last_name }}
                    {% if user.first_name %} {{ user.first_name|slice:":1" }}.{% endif %}
                    {% if user.patronymic %} {{ user.patronymic|slice:":1" }}.{% endif %}
                </div>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-secondary btn-sm director-logout-btn" title="Выйти">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </header>

    <main class="director-main-wrap">
        <div class="director-main">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
