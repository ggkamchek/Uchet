{% extends 'main/base_dashboard.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h2 class="mb-4">{% if object %}Редактировать уровень{% else %}Создать уровень{% endif %}</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="{{ form.caption.id_for_label }}" class="form-label">Название уровня</label>
                {{ form.caption.errors }}
                <input type="text" name="{{ form.caption.name }}" id="{{ form.caption.id_for_label }}" 
                       class="form-control {% if form.caption.errors %}is-invalid{% endif %}" 
                       value="{{ form.caption.value|default:'' }}">
            </div>
            <div class="mb-3">
                <label for="{{ form.field.id_for_label }}" class="form-label">Поле</label>
                {{ form.field.errors }}
                <select name="{{ form.field.name }}" id="{{ form.field.id_for_label }}" 
                        class="form-select {% if form.field.errors %}is-invalid{% endif %}">
                    {% for choice in form.field.field.choices %}
                        <option value="{{ choice.0 }}" {% if form.field.value == choice.0 %}selected{% endif %}>{{ choice.1 }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="{{ form.ratio.id_for_label }}" class="form-label">Коэффициент</label>
                {{ form.ratio.errors }}
                <input type="number" name="{{ form.ratio.name }}" id="{{ form.ratio.id_for_label }}" 
                       class="form-control {% if form.ratio.errors %}is-invalid{% endif %}" 
                       value="{{ form.ratio.value|default:'' }}" step="0.01">
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'level_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
