{% extends 'main/base_dashboard.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Подтверждение удаления</h5>
            </div>
            <div class="card-body">
                <p>Вы уверены, что хотите удалить критерий <strong>"{{ object.name }}"</strong>?</p>
                <p class="text-danger">Это действие нельзя отменить. Также будут удалены все связанные поля и уровни (если они есть).</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Да, удалить</button>
                    <a href="{% url 'criterion_list' %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
