{% extends 'main/base_dashboard.html' %}

{% block content %}
<h2>{% if object %}Редактировать критерий{% else %}Новый критерий{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'criterion_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
