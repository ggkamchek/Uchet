{% extends 'main/base_dashboard.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h2 class="mb-4">{% if object %}Редактировать критерий{% else %}Создать критерий{% endif %}</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="{{ form.name.id_for_label }}" class="form-label">Название критерия</label>
                {{ form.name.errors }}
                <input type="text" name="{{ form.name.name }}" id="{{ form.name.id_for_label }}"
                       class="form-control {% if form.name.errors %}is-invalid{% endif %}"
                       value="{{ form.name.value|default:'' }}">
            </div>
            <div class="mb-3">
                <label for="{{ form.work.id_for_label }}" class="form-label">Работа</label>
                {{ form.work.errors }}
                <select name="{{ form.work.name }}" id="{{ form.work.id_for_label }}"
                        class="form-select {% if form.work.errors %}is-invalid{% endif %}">
                    {% for choice in form.work.field.choices %}
                        <option value="{{ choice.0 }}" {% if form.work.value == choice.0 or form.work.value|stringformat:"s" == choice.0|stringformat:"s" %}selected{% endif %}>{{ choice.1 }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="{{ form.ratio.id_for_label }}" class="form-label">Коэффициент</label>
                {{ form.ratio.errors }}
                <input type="number" name="{{ form.ratio.name }}" id="{{ form.ratio.id_for_label }}"
                       class="form-control {% if form.ratio.errors %}is-invalid{% endif %}"
                       value="{{ form.ratio.value|default:'' }}" step="any">
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'criterion_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
