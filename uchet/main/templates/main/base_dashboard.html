<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-size: 1.15rem;
        }
        .admin-topbar {
            background: #e5e7eb;
            border-bottom: 1px solid #d1d5db;
        }
        .admin-topbar-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .admin-app-name {
            font-size: 1.65rem;
            font-weight: 600;
            color: #111827;
            line-height: 1.1;
        }
        .admin-nav {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .admin-nav-links {
            display: flex;
            gap: 10px;
            font-size: 0.95rem;
        }
        .admin-nav-links a {
            text-decoration: none;
            color: #4b5563;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .admin-nav-links a:hover {
            background: #e5e7eb;
            color: #111827;
        }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-user-name {
            font-size: 1.05rem;
            font-weight: 500;
            color: #111827;
            white-space: nowrap;
        }
        .admin-logout-btn {
            border-radius: 10px;
            padding: 6px 10px;
            background-color: #374151;
            border-color: #374151;
            color: #ffffff;
        }
        .admin-logout-btn:hover {
            background-color: #111827;
            border-color: #111827;
            color: #ffffff;
        }
        .admin-main {
            max-width: 1280px;
        }

        /* Нейтральные бейджи и кнопки для админки */
        .badge-muted {
            background-color: #e5e7eb;
            color: #4b5563;
            font-weight: 500;
        }
        .badge-active-period {
            background-color: #d1fae5;
            color: #047857;
        }
        .admin-main .btn-icon-outline {
            border-radius: 999px;
            padding-inline: 10px;
            border-color: #9ca3af;
            color: #374151;
            background-color: transparent;
        }
        .admin-main .btn-icon-outline:hover {
            background-color: #111827;
            border-color: #111827;
            color: #ffffff;
        }

        /* Унифицируем стандартные bootstrap-кнопки на админских страницах */
        .admin-main .btn-primary,
        .admin-main .btn-success,
        .admin-main .btn-info,
        .admin-main .btn-warning {
            background-color: #e5e7eb;
            border-color: #9ca3af;
            color: #111827;
        }
        .admin-main .btn-primary:hover,
        .admin-main .btn-success:hover,
        .admin-main .btn-info:hover,
        .admin-main .btn-warning:hover {
            background-color: #d1d5db;
            border-color: #6b7280;
            color: #111827;
        }

        .admin-main .btn-danger {
            background-color: #6b7280;
            border-color: #4b5563;
            color: #ffffff;
        }
        .admin-main .btn-danger:hover {
            background-color: #4b5563;
            border-color: #374151;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header class="admin-topbar">
        <div class="admin-topbar-inner">
            <a href="{% url 'dashboard_home' %}" class="text-decoration-none">
                <div class="admin-app-name">TeachKPI</div>
            </a>

            <div class="admin-nav">
                <nav class="admin-nav-links">
                    <a href="{% url 'work_list' %}">Работы</a>
                    <a href="{% url 'criterion_list' %}">Критерии</a>
                    <a href="{% url 'field_list' %}">Поля</a>
                    <a href="{% url 'level_list' %}">Уровни</a>
                    <a href="{% url 'period_list' %}">Периоды</a>
                    <a href="{% url 'user_create' %}">Пользователи</a>
                </nav>

                <div class="admin-user">
                    <div class="admin-user-name">
                        {{ user.last_name }}
                        {% if user.first_name %} {{ user.first_name|slice:":1" }}.{% endif %}
                        {% if user.patronymic %} {{ user.patronymic|slice:":1" }}.{% endif %}
                    </div>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-secondary btn-sm admin-logout-btn" title="Выйти">
                            <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </header>

    <div class="container mt-4 admin-main">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
