<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'dashboard_home' %}">Админ-панель</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'work_list' %}">Работы</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'criterion_list' %}">Критерии</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'field_list' %}">Поля</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'level_list' %}">Уровни</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'period_list' %}">Периоды</a></li>
                </ul>
                <span class="navbar-text me-2">{{ user.username }} ({{ user.role }})</span>
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
