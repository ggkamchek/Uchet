<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель преподавателей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-size: 1.2rem; /* заметно крупнее базовый текст на страницах преподавателя */
        }
        /* Монохромные кнопки по умолчанию */
        .btn-primary,
        .btn-success,
        .btn-danger,
        .btn-outline-primary,
        .btn-outline-success,
        .btn-outline-danger {
            background-color: #111827;
            border-color: #111827;
            color: #ffffff;
        }
        .btn-primary:hover,
        .btn-success:hover,
        .btn-danger:hover,
        .btn-outline-primary:hover,
        .btn-outline-success:hover,
        .btn-outline-danger:hover {
            background-color: #000000;
            border-color: #000000;
            color: #ffffff;
        }
        .btn-outline-secondary {
            background-color: transparent;
            border-color: #4b5563;
            color: #111827;
        }
        .btn-outline-secondary:hover {
            background-color: #111827;
            border-color: #111827;
            color: #ffffff;
        }
        .teacher-topbar {
            background: #e5e7eb; /* более тёмно-серый фон шапки */
            border-bottom: 1px solid #d1d5db;
        }
        .teacher-topbar-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .teacher-app-brand {
            font-size: 1.65rem;
            font-weight: 600;
            color: #111827;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            gap: 0.3em;
            white-space: nowrap;
        }
        .teacher-app-brand:hover {
            color: #111827;
        }
        .teacher-app-brand > span:last-child {
            line-height: 1;
            display: inline-block;
        }
        .tkpi-book-inline-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            height: 1.48em;
            line-height: 0;
            transform: translateY(0.2em);
        }
        .tkpi-book-inline-wrap svg {
            height: 100%;
            width: auto;
            display: block;
        }
        .teacher-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .teacher-user-name {
            font-size: 1.15rem;
            font-weight: 500;
            color: #111827;
            white-space: nowrap;
        }
        .teacher-logout-btn {
            border-radius: 10px;
            padding: 6px 10px;
            background-color: #374151;  /* тёмно-серый */
            border-color: #374151;
            color: #ffffff;
        }
        .teacher-logout-btn:hover {
            background-color: #111827;
            border-color: #111827;
            color: #ffffff;
        }
        .teacher-main {
            max-width: 1280px;
        }
    </style>
</head>
<body>
    <header class="teacher-topbar">
        <div class="teacher-topbar-inner">
            <a href="{% url 'teacher_dashboard' %}" class="teacher-app-brand text-decoration-none">
                <span class="tkpi-book-inline-wrap" aria-hidden="true">
                    {% include 'main/includes/teachkpi_book_icon.html' with book_uid='teacher' %}
                </span>
                <span>TeachKPI</span>
            </a>

            <div class="teacher-user">
                <div class="teacher-user-name">
                    {{ user.last_name }}
                    {% if user.first_name %} {{ user.first_name|slice:":1" }}.{% endif %}
                    {% if user.patronymic %} {{ user.patronymic|slice:":1" }}.{% endif %}
                </div>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-secondary btn-sm teacher-logout-btn" title="Выйти">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </header>

    <div class="container mt-4 teacher-main">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
