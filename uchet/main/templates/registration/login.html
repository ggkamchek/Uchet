<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — TeachKPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ========== ЦВЕТОВАЯ СХЕМА (ПОДСТАВЬТЕ СВОИ ЗНАЧЕНИЯ) ========== */
        :root {
            --bg-body: #2a2a2a;          /* тёмно-серый фон вокруг "карточки" */
            --card-bg: #ffffff;          /* белый фон центрального блока */
            --primary-btn: #1b1d20;      /* почти чёрная кнопка */
            --primary-hover: #000000;    /* цвет кнопки при наведении */
            --text-muted: #6c757d;       /* цвет ссылки "Забыли пароль?" */
            --border-input: #e1e1e1;
            --border-radius-card: 8px;
            --border-radius-btn: 40px;
        }

        body {
            background-color: var(--bg-body);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }

        /* Обёртка по центру экрана, как в макете */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Центральная "белая" область */
        .auth-panel {
            background-color: var(--card-bg);
            border-radius: var(--border-radius-card);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 960px;
            min-height: 420px;
            overflow: hidden;
        }

        /* Левая часть с логотипом */
        .auth-logo-side {
            flex: 0 0 auto;
            padding: 2.5rem 2.5rem 2.5rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;     /* центрируем по горизонтали */
            text-align: center;
            border-bottom: 1px solid #f1f1f1;
        }

        /* Логотип — одна SVG, без «сборки» из псевдоэлементов */
        .logo-icon {
            width: 200px;
            height: 200px;
            margin-bottom: 0.85rem;
            filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.14));
        }

        .logo-icon svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .logo-text {
            font-size: 4.1rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            margin-top: 0.45rem;
            line-height: 1;
        }

        /* Правая часть с формой */
        .auth-form-side {
            flex: 1 1 auto;
            padding: 2.5rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .btn-login {
            background-color: var(--primary-btn);
            border: none;
            padding: 0.7rem;
            font-weight: 500;
            border-radius: var(--border-radius-btn);
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
        }

        .forgot-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .forgot-link:hover {
            text-decoration: underline;
            color: var(--primary-btn);
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 0.6rem 1rem;
            border-color: var(--border-input);
        }

        .form-control:focus {
            border-color: var(--primary-btn);
            box-shadow: 0 0 0 0.15rem rgba(0, 0, 0, 0.18);
        }

        /* Вёрстка "два столбца" на широком экране, один столбец на узком */
        @media (min-width: 768px) {
            .auth-panel {
                flex-direction: row;
            }

            .auth-logo-side {
                flex: 0 0 40%;
                border-right: 1px solid #f1f1f1;
                border-bottom: none;
            }

            .auth-form-side {
                flex: 0 0 60%;
            }
        }

        @media (max-width: 767.98px) {
            .auth-logo-side {
                align-items: center;
                text-align: center;
                padding: 2rem 1.5rem 1.5rem;
            }

            .logo-text {
                text-align: center;
            }

            .auth-form-side {
                padding: 1.5rem 1.75rem 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-panel">
            <div class="auth-logo-side">
                <div class="logo-icon" role="img" aria-label="TeachKPI">
                    {% include 'main/includes/teachkpi_book_icon.html' with book_uid='loginHero' %}
                </div>
                <div class="logo-text">TeachKPI</div>
            </div>

            <div class="auth-form-side">
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    {% if form.errors %}
                        <div class="alert alert-danger alert-sm mb-3 py-2">
                            Неверный логин или пароль.
                        </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Логин</label>
                        <input type="text" name="username" id="id_username" class="form-control"
                               placeholder="Введите логин" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="id_password" class="form-label">Пароль</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn w-100 btn-login text-white">Войти</button>

                    <input type="hidden" name="next" value="{{ next }}">
                </form>
            </div>
        </div>
    </div>
</body>
</html>
